<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Devotion 🖤</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
background:#0a0a0a;
color:#f0e6e6;
font-family:Georgia,serif;
margin:0;
}

.screen{display:none;height:100vh}
.screen.active{display:flex;align-items:center;justify-content:center}

.view{display:none}
.view.active{display:block}

button{cursor:pointer}
</style>
</head>

<body>

<!-- LOADING -->
<div class="screen active" id="screen-loading">
Loading...
</div>

<!-- PIN -->
<div class="screen" id="screen-pin">
<div>
<h2>Enter PIN</h2>
<input id="pin-input" type="password" maxlength="4"/>
<button onclick="verifyPin()">Enter</button>
</div>
</div>

<!-- APP -->
<div class="screen" id="screen-app">

<header style="display:flex;justify-content:space-between;padding:10px">
<div>🖤 DEVOTION</div>

<div id="role-badge">Sub</div>

<div>
<button onclick="refreshAll()">↻</button>
<button onclick="lockApp()">🔒</button>
</div>
</header>

<div id="main">

<!-- SUB -->
<div class="view" id="view-sub">

<h3>Chores</h3>
<div id="chores-list"></div>

<h3>Rewards</h3>
<div id="rewards-list"></div>

<h3>History</h3>
<div id="log-list"></div>

</div>

<!-- MISTRESS -->
<div class="view" id="view-mistress">

<h3>Requests</h3>
<div id="requests-list"></div>

<h3>Manage Chores</h3>
<div id="manage-chores-list"></div>

<h3>Manage Rewards</h3>
<div id="manage-rewards-list"></div>

</div>

</div>
</div>

<script>

let sb=null
let currentRole=null

let state={
points:0,
chores:[],
rewards:[],
log:[],
requests:[],
choreRequests:[]
}

function showScreen(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.getElementById("screen-"+id).classList.add("active")
}

async function connectSupabase(url,key){

if(!window.supabase){
alert("Supabase failed to load")
return
}

sb=supabase.createClient(url,key)

checkSession()
}

function checkSession(){

const s=JSON.parse(localStorage.getItem("devotion_session")||"null")

if(s && s.role && Date.now()<s.expires){

currentRole=s.role
enterApp()
return
}

showScreen("pin")
}

function saveSession(role){

localStorage.setItem("devotion_session",JSON.stringify({
role,
expires:Date.now()+604800000
}))

}

function lockApp(){

localStorage.removeItem("devotion_session")
currentRole=null
showScreen("pin")

}

async function verifyPin(){

const pin=document.getElementById("pin-input").value

const {data}=await sb
.from("devotion_pins")
.select("pin,role")

const match=data.find(p=>p.pin===pin)

if(!match){
alert("Wrong PIN")
return
}

currentRole=match.role

saveSession(match.role)

enterApp()

}

async function enterApp(){

showScreen("loading")

document.getElementById("view-sub").classList.remove("active")
document.getElementById("view-mistress").classList.remove("active")

if(currentRole==="sub")
document.getElementById("view-sub").classList.add("active")
else
document.getElementById("view-mistress").classList.add("active")

document.getElementById("role-badge").textContent=currentRole

await loadAll()

showScreen("app")

}

async function loadAll(){

const [s,c,r,l,q,cr]=await Promise.all([

sb.from("devotion_state").select("*").eq("id","main").single(),

sb.from("devotion_chores").select("*"),

sb.from("devotion_rewards").select("*"),

sb.from("devotion_log").select("*"),

sb.from("devotion_requests").select("*"),

sb.from("devotion_chore_requests").select("*")

])

if(s.data) state.points=s.data.points
if(c.data) state.chores=c.data
if(r.data) state.rewards=r.data
if(l.data) state.log=l.data
if(q.data) state.requests=q.data
if(cr.data) state.choreRequests=cr.data

renderAll()

}

function renderAll(){

renderChores()
renderRewards()
renderLog()
renderRequests()

}

function renderChores(){

const el=document.getElementById("chores-list")

if(!state.chores.length){
el.innerHTML="No chores"
return
}

el.innerHTML=state.chores.map(c=>`
<div>
${c.name} (+${c.pts})
<button onclick="submitChore(${c.id})">Done</button>
</div>
`).join("")

}

async function submitChore(id){

const c=state.chores.find(x=>x.id===id)

await sb.from("devotion_chore_requests").insert({
chore_id:c.id,
chore_name:c.name,
chore_pts:c.pts
})

loadAll()

}

function renderRewards(){

const el=document.getElementById("rewards-list")

if(!state.rewards.length){
el.innerHTML="No rewards"
return
}

el.innerHTML=state.rewards.map(r=>`
<div>
${r.name} (${r.pts})
<button onclick="redeemReward(${r.id})">Redeem</button>
</div>
`).join("")

}

async function redeemReward(id){

const r=state.rewards.find(x=>x.id===id)

await sb.from("devotion_requests").insert({
reward_id:r.id,
reward_name:r.name,
reward_cat:r.cat,
reward_pts:r.pts
})

loadAll()

}

function renderLog(){

const el=document.getElementById("log-list")

if(!state.log.length){
el.innerHTML="No history"
return
}

el.innerHTML=state.log.map(e=>`
<div>
${e.text} ${e.pts}
</div>
`).join("")

}

function renderRequests(){

const el=document.getElementById("requests-list")

const all=[...state.requests,...state.choreRequests]

if(!all.length){
el.innerHTML="No requests"
return
}

el.innerHTML=all.map(r=>`
<div>
${r.reward_name || r.chore_name}
(${r.status})
</div>
`).join("")

}

function refreshAll(){
loadAll()
}

window.addEventListener("load",()=>{

const url=localStorage.getItem("sb_url")
const key=localStorage.getItem("sb_key")

if(url && key)
connectSupabase(url,key)
else
showScreen("pin")

})

</script>

</body>
</html>
